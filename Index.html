            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: #e0d4f7;
        }

        .header .subtitle a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .header .subtitle a:hover {
            color: #fff;
            text-shadow: 0 0 10px #ffd700;
        }

        .iframe-container {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease-out 0.3s both;
            max-width: 100%;
            width: 740px;
            overflow-x: auto;
        }

        .iframe-container iframe {
            display: block;
            border-radius: 8px;
            max-width: 100%;
        }

        /* Sticky WhatsApp Banner */
        .sticky-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, #25d366 0%, #128c7e 100%);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 9999;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
        }

        .sticky-banner a {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .sticky-banner a:hover {
            opacity: 0.9;
        }

        .sticky-banner .wa-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .sticky-banner .banner-text {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .iframe-container {
                padding: 10px;
            }

            .sticky-banner a {
                font-size: 0.95rem;
            }
        }
    </style>
